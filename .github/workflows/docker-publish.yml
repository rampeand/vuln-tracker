name: Build and Push Docker Images

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start containers
        run: |
          docker compose up -d --build
      
      - name: Wait for services to be healthy
        run: |
          # Simple check to wait for backend health
          for i in {1..10}; do
            if curl -s http://localhost:8000/health | grep -q "healthy"; then
              echo "Backend is healthy!"
              break
            fi
            echo "Waiting for backend..."
            sleep 5
          done
          
          # Check frontend is serving something
          if curl -s http://localhost:3000 | grep -q "<html"; then
            echo "Frontend is serving HTML!"
          else
            echo "Frontend failed to serve content"
            exit 1
          fi

      - name: Clean up temporary containers
        run: docker compose down

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: rampeand/vuln-tracker:backend,rampeand/vuln-tracker:backend-${{ github.sha }}

      - name: Build and push frontend
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: rampeand/vuln-tracker:frontend,rampeand/vuln-tracker:frontend-${{ github.sha }}
          build-args: |
            VITE_API_URL=http://localhost:8000
