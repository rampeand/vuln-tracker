name: Build and Push Docker Images

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start containers
        run: |
          docker compose up -d --build
      
      - name: Wait for services to be healthy
        run: |
          # Wait for backend health endpoint to respond
          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -s http://localhost:8000/health | grep -q "healthy"; then
              echo "Backend is healthy!"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Backend failed to become healthy"
              docker compose logs backend
              exit 1
            fi
            sleep 5
          done

          # Wait for frontend (depends on backend being Docker-healthy, may lag)
          echo "Waiting for frontend..."
          for i in {1..20}; do
            if curl -s http://localhost:3000 | grep -q "<html"; then
              echo "Frontend is serving HTML!"
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "Frontend failed to serve content"
              docker compose logs frontend
              exit 1
            fi
            sleep 5
          done

      - name: Clean up temporary containers
        run: docker compose down

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: rampeand/vuln-tracker:backend,rampeand/vuln-tracker:backend-${{ github.sha }}

      - name: Build and push frontend
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: rampeand/vuln-tracker:frontend,rampeand/vuln-tracker:frontend-${{ github.sha }}
          build-args: |
            VITE_API_URL=http://localhost:8000
